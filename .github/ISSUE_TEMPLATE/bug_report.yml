name: Bug report
description: Something is broken or not behaving as expected
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in what you can; partial reports are still useful.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the problem.
      placeholder: e.g. Playlist page shows an error after linking Spotify…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else see the same issue?
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error messages or screenshots if helpful.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and how you run the app (e.g. local dev, Docker, deployed URL) if relevant.
      placeholder: |
        - Browser: …
        - OS: …
        - App version / commit / image tag (if known): …
    validations:
      required: false

  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      description: Do you intend to open a pull request that addresses this?
      options:
        - I will not open a PR
        - Maybe, need help
        - Yes absolutely
    validations:
      required: true
