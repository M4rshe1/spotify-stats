name: Feature request
description: Suggest an idea or improvement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Share what you would like to see. Clear use cases help a lot.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow would it improve?
      placeholder: e.g. I want to export my listening stats as CSV…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working (UI, API, behavior). Sketches or examples welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought of, or workarounds you use today.
    validations:
      required: false

  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      description: Do you intend to open a pull request that implements this?
      options:
        - I will not open a PR
        - Maybe, need help
        - Yes absolutely
    validations:
      required: true
